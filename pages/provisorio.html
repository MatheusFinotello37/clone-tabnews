<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #ffffff;
      }

      .image-container {
        text-align: center;
      }

      .image-container img {
        max-width: 100%;
        height: auto;
        margin: 10px; /* Adicione margem entre as imagens */
      }
    </style>
  </head>
  <body>
    <div class="image-container">
      <img src="coffee-shop.gif" alt="Imagem 1" width="200" height="150" />
      <img
        src="statue-of-liberty.gif"
        alt="Imagem 2"
        width="200"
        height="150"
      />
      <img src="save-money.gif" alt="Imagem 3" width="200" height="150" />
    </div>
  </body>
</html>
